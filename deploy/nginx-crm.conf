# upstream node backend
upstream crm_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirigir HTTP a HTTPS
server {
    listen 80;
    server_name movilbro-crm.com www.movilbro-crm.com;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name movilbro-crm.com www.movilbro-crm.com;

    # SSL (Let's Encrypt - certbot)
    ssl_certificate /etc/letsencrypt/live/movilbro-crm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/movilbro-crm.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/movilbro-crm.com/chain.pem;

    # Seguridad SSL moderna
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (6 meses)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Seguridad headers adicionales
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Limitar métodos HTTP
    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE)$) {
        return 405;
    }

    # Protección contra bots comunes
    location / {
        # Limitar tamaño de peticiones
        client_max_body_size 2m;
        client_body_buffer_size 128k;

        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Cache estático (1 año)
    location /img/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location /css/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location /js/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # Bloquear acceso a archivos sensibles
    location ~* \.(env|db|sqlite|sqlite3|log|sh|ps1|key|crt|pem)$ {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }

    location ~ /node_modules {
        deny all;
        return 404;
    }

    # Logs
    access_log /var/log/nginx/movilbro-crm-access.log;
    error_log /var/log/nginx/movilbro-crm-error.log;
}
