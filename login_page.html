        <script>
            
            function emergente(mensaje, tipo, retardo) {
                if (tipo == '')
                    tipo = 'information';

                if (tipo == 'error')
                    var close = false;
                else
                    var close = true;

                if (parseInt(retardo) > 0)
                    $.noty({text: mensaje, layout: 'top', type: tipo, timeout: retardo, closeOnSelfClick: close, closeButton: false});
                else
                    $.noty({text: mensaje, layout: 'top', type: tipo, timeout: false, closeOnSelfClick: close, closeButton: true});
            };
        
        $('[rel="tooltip"],[data-rel="tooltip"]').tooltip({"placement": "bottom", delay: {show: 400, hide: 200}});

function abre_popup_bs(url,titulo,ancho,alto){
            $('.modal-header h3').html(titulo);
            $('.modal-body').html('');
            $('.modal-body').load(url);
            
            var unit1 = '%';
            var unit2 = '%'
            var left  = -(parseInt(alto)/2);
            var top   = -(parseInt(ancho)/2);

            if (ancho.substring(ancho.length-2)=='px'){
                unit1 = 'px';
            }
            
            if (alto.substring(alto.length-2)=='px'){
                unit2 = 'px';
            }

            left = left+unit1;
            top = top+unit2;
            

            //si el ancho del popup no cabe en pantalla, lo modificamos
            if (unit1=='px'){
                var ancho_pantalla = Math.max(document.documentElement.clientWidth, window.innerWidth || 0);
                if (ancho_pantalla < parseInt(ancho)){
                    ancho ='90%';
                    //alto  ='auto';
                    top   = 0;
                    left  = 0;
                }
            }
           
            $('#myModal').modal('show').css({
                    'width': ancho,
                    'height': alto,
                    'margin-top': top,
                    'margin-left': left
            });
      };
